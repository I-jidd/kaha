services:
  db:
    image: postgres:16-alpine
    container_name: kaha_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kaha_db}
      POSTGRES_USER: ${POSTGRES_USER:-kaha_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kaha_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - kaha_postgres_data:/var/lib/postgresql/data

volumes:
  kaha_postgres_data:
